# Production / consumer compose — pulls pre-built images from Docker Hub.
# Recipients only need this file, .env, and (optionally) docker/db-init/*.sql.
#
# Usage:
#   IMAGE_OWNER=<dockerhub-user> IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d
# or set IMAGE_OWNER and IMAGE_TAG inside .env

services:
  mysql:
    image: mariadb:10.11
    container_name: datarover-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DB_NAME:-datarover}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    networks:
      - datarover-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  apache:
    image: ${IMAGE_OWNER:-bqasimov}/htdocs-apache:${IMAGE_TAG:-v1.0}
    container_name: datarover-apache
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-datarover}
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpw}
      SCANNER_URL: http://scanner:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${APACHE_HOST_PORT:-8080}:80"
    networks:
      - datarover-net

  scanner:
    image: ${IMAGE_OWNER:-bqasimov}/htdocs-scanner:${IMAGE_TAG:-v1.0}
    container_name: datarover-scanner
    restart: unless-stopped
    ports:
      - "${SCANNER_HOST_PORT:-8000}:8000"
    networks:
      - datarover-net

  schedule:
    image: ${IMAGE_OWNER:-bqasimov}/htdocs-schedule:${IMAGE_TAG:-v1.0}
    container_name: datarover-schedule
    restart: unless-stopped
    depends_on:
      - apache
    environment:
      DATAROVER_URL: http://apache/datarover/backend.php
    volumes:
      - schedule-data:/data
    ports:
      - "${SCHEDULE_HOST_PORT:-8001}:8001"
    networks:
      - datarover-net

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: datarover-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      UPLOAD_LIMIT: 256M
    ports:
      - "${PMA_HOST_PORT:-8082}:80"
    networks:
      - datarover-net

networks:
  datarover-net:
    driver: bridge

volumes:
  mysql-data:
  schedule-data:
