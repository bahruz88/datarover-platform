    <link rel="stylesheet" href="css/style.css">

    <script>
        mermaid.initialize({ 
            startOnLoad: true,
            theme: 'base',
            themeVariables: {
                fontSize: '15px',
                fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif',
                primaryColor: '#ffffff',
                primaryTextColor: '#1f2937',
                primaryBorderColor: '#e5e7eb',
                lineColor: '#d1d5db',
                secondaryColor: '#f9fafb',
                tertiaryColor: '#f3f4f6',
                mainBkg: '#ffffff',
                nodeBorder: '#e5e7eb',
                clusterBkg: '#f9fafb',
                clusterBorder: '#e5e7eb'
            },
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'cardinal',
                padding: 20,
                nodeSpacing: 100,
                rankSpacing: 150,
                diagramPadding: 20
            }
        });
    </script>
    <style>
        /* Language Switcher */
        .lang-switcher {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 4px;
        }
        
        .lang-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        
        .lang-btn:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.1);
        }
        
        .lang-btn.active {
            background: #3b82f6;
            color: #ffffff;
        }
        
        /* CRITICAL: Mermaid rounded corners və əyri xətlər */
        svg .node rect {
            rx: 16 !important;
            ry: 16 !important;
        }
        
        /* User profile in sidebar */
        .user-profile {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-weight: 600;
            color: white;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .user-role {
            font-size: 11px;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .user-actions {
            display: flex;
            gap: 4px;
        }
        
        .user-actions button {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .user-actions button:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .menu-divider {
            padding: 20px 20px 8px;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .sidebar {
            padding-bottom: 80px;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10001;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.error {
            background: #dc2626;
        }
    </style>
</head>

<script>
// ============================================================
// SCHEDULE MODAL FUNCTIONS - SIMPLIFIED
// ============================================================

let allRules = [];

// ────────────────────────────────────────────────────────────
// SHOW CREATE MODAL
// ────────────────────────────────────────────────────────────

async function showCreateScheduleModal() {
    document.getElementById('scheduleModalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> Yeni Schedule Yarat';
    document.getElementById('scheduleForm').reset();
    document.getElementById('scheduleId').value = '';
    document.getElementById('scheduleTime').value = '09:00';
    document.getElementById('scheduleEnabled').checked = true;
    
    // Load ALL rules (no connection filter!)
    await loadAllRules();
    
    document.getElementById('scheduleModal').classList.add('show');
}

// ────────────────────────────────────────────────────────────
// LOAD ALL RULES (NO CONNECTION FILTER)
// ────────────────────────────────────────────────────────────

async function loadAllRules() {
    const container = document.getElementById('rulesSelectionContainer');
    container.innerHTML = '<div class="schedule-loading">Rules yüklənir...</div>';
    
    try {
        // Get ALL rules (no connection_id filter!)
        const response = await fetch(API + '?action=get_quality_rules');
        const data = await response.json();
        
        console.log('All rules API response:', data);
        
        // Handle different response formats
        let rules = [];
        if (Array.isArray(data)) {
            rules = data;
        } else if (data.data && Array.isArray(data.data)) {
            rules = data.data;
        } else if (data.success && data.data && Array.isArray(data.data)) {
            rules = data.data;
        } else {
            console.error('Unexpected rules format:', data);
            rules = [];
        }
        
        allRules = rules;
        
        if (allRules.length === 0) {
            container.innerHTML = '<div class="schedule-empty-state">Quality rule tapılmadı. Əvvəlcə rule yaradın.</div>';
            return;
        }
        
        // Build rules UI
        let html = '<div class="rule-selection-container">';
        
        // Header with Select All and Search
        html += `
            <div class="rule-selection-header">
                <label class="rule-select-all">
                    <input type="checkbox" id="selectAllRules" onchange="toggleAllRules(this.checked)">
                    <span style="font-weight: 600;">Hamısını seç</span>
                </label>
                <input 
                    type="text" 
                    id="ruleSearch" 
                    class="rule-search" 
                    placeholder="Axtar..." 
                    onkeyup="filterRules()"
                >
            </div>
        `;
        
        // Individual Rules
        allRules.forEach(rule => {
            html += `
                <div class="rule-item" data-rule-name="${(rule.name || '').toLowerCase()}" data-connection="${(rule.connection_name || '').toLowerCase()}">
                    <input type="checkbox" class="rule-checkbox" value="${rule.id}" onchange="updateSelectedCount()" checked>
                    <div class="rule-item-content">
                        <div class="rule-item-name">
                            ${rule.name || 'Rule #' + rule.id}
                            ${rule.connection_name ? '<span class="rule-item-connection">' + rule.connection_name + '</span>' : ''}
                        </div>
                        <div class="rule-item-meta">
                            ${rule.table_name ? 'Table: ' + rule.table_name : ''}
                            ${rule.rule_type ? ' • Type: ' + rule.rule_type : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        container.innerHTML = html;
        
        // Check "Select All" by default
        document.getElementById('selectAllRules').checked = true;
        
        // Update count
        updateSelectedCount();
        
    } catch (error) {
        console.error('Error loading rules:', error);
        container.innerHTML = '<div class="schedule-empty-state">Rules yüklənə bilmədi: ' + error.message + '</div>';
    }
}

// ────────────────────────────────────────────────────────────
// FILTER RULES
// ────────────────────────────────────────────────────────────

function filterRules() {
    const searchText = document.getElementById('ruleSearch').value.toLowerCase();
    const ruleItems = document.querySelectorAll('.rule-item');
    
    ruleItems.forEach(item => {
        const ruleName = item.getAttribute('data-rule-name');
        const connection = item.getAttribute('data-connection');
        
        if (ruleName.includes(searchText) || connection.includes(searchText)) {
            item.style.display = 'flex';
        } else {
            item.style.display = 'none';
        }
    });
}

// ────────────────────────────────────────────────────────────
// TOGGLE ALL RULES
// ────────────────────────────────────────────────────────────

function toggleAllRules(checked) {
    document.querySelectorAll('.rule-checkbox').forEach(cb => {
        // Only toggle visible rules
        if (cb.closest('.rule-item').style.display !== 'none') {
            cb.checked = checked;
        }
    });
    updateSelectedCount();
}

// ────────────────────────────────────────────────────────────
// UPDATE SELECTED COUNT
// ────────────────────────────────────────────────────────────

function updateSelectedCount() {
    const selectedCount = document.querySelectorAll('.rule-checkbox:checked').length;
    const badge = document.getElementById('selectedRuleCount');
    
    if (selectedCount > 0) {
        badge.textContent = selectedCount + ' seçildi';
        badge.style.display = 'inline-block';
    } else {
        badge.style.display = 'none';
    }
}

// ────────────────────────────────────────────────────────────
// SAVE SCHEDULE
// ────────────────────────────────────────────────────────────

async function saveSchedule(event) {
    event.preventDefault();
    
    // Get selected rules
    const selectedRules = Array.from(document.querySelectorAll('.rule-checkbox:checked'))
        .map(cb => parseInt(cb.value));
    
    if (selectedRules.length === 0) {
        alert('Ən azı 1 rule seçin!');
        return;
    }
    
    const scheduleData = {
        name: document.getElementById('scheduleName').value,
        rule_ids: selectedRules,  // Just rule IDs - no connection_id needed!
        frequency: document.getElementById('scheduleFrequency').value,
        run_time: document.getElementById('scheduleTime').value,
        notify_email: document.getElementById('scheduleEmail').value || null,
        enabled: document.getElementById('scheduleEnabled').checked ? 1 : 0
    };
    
    console.log('Saving schedule:', scheduleData);
    
    const scheduleId = document.getElementById('scheduleId').value;
    
    try {
        const url = scheduleId 
            ? API + '?action=quality_schedules&id=' + scheduleId
            : API + '?action=quality_schedules';
        
        const method = scheduleId ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(scheduleData)
        });
        
        const result = await response.json();
        
        console.log('Save result:', result);
        
        if (result.success) {
            showToast(scheduleId ? 'Schedule yeniləndi!' : 'Schedule yaradıldı!');
            closeScheduleModal();
            
            // Reload schedules list
            if (typeof loadQualitySchedules === 'function') {
                loadQualitySchedules();
            }
        } else {
            alert('Xəta: ' + (result.message || result.error || 'Schedule saxlanıla bilmədi'));
        }
        
    } catch (error) {
        console.error('Error saving schedule:', error);
        alert('Schedule saxlanıla bilmədi: ' + error.message);
    }
}

// ────────────────────────────────────────────────────────────
// CLOSE MODAL
// ────────────────────────────────────────────────────────────

function closeScheduleModal() {
    document.getElementById('scheduleModal').classList.remove('show');
}

// ────────────────────────────────────────────────────────────
// MODAL OUTSIDE CLICK
// ────────────────────────────────────────────────────────────

window.addEventListener('click', function(event) {
    if (event.target.classList.contains('schedule-modal')) {
        event.target.classList.remove('show');
    }
});

</script>
